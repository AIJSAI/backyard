name: gates

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - run: python scripts/check_stories.py
      # TM-2 drift-guard: the digest builder reads only through the audience
      # guard; the script self-tests its patterns so it can never go vacuous.
      - run: python scripts/check_digest_confinement.py

  code:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: backyard
          POSTGRES_USER: backyard
          POSTGRES_PASSWORD: ci-not-a-secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U backyard"
          --health-interval 3s
          --health-timeout 3s
          --health-retries 20
    env:
      # Non-placeholder value so settings.py boots; not a real secret, low entropy on purpose.
      DJANGO_SECRET_KEY: ci-not-a-secret-deadbeef-cafe-1234567890
      POSTGRES_HOST: localhost
      POSTGRES_PASSWORD: ci-not-a-secret
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.6"
      - run: uv sync --frozen
      - name: Lint
        run: |
          uv run ruff check src
          uv run ruff format --check src
      - name: Typecheck
        run: uv run mypy src
      - name: Tests
        run: uv run pytest
      - name: Deploy check (production-like posture, fail on any warning)
        # Catches a regression in deployment security posture (threat model TS-DJ-10): secure
        # cookies, HSTS, SSL redirect, DEBUG off. Run against a production-like env so the
        # HTTPS-keyed hardening engages; the key here is long enough to pass W009 and is not a
        # real secret.
        env:
          DJANGO_DEBUG: "0"
          BACKYARD_BASE_URL: https://ci.example.com
          DJANGO_ALLOWED_HOSTS: ci.example.com
          DJANGO_SECRET_KEY: ci-deploy-check-not-a-secret-0123456789abcdef0123456789abcdef
        run: uv run python manage.py check --deploy --fail-level WARNING
      - name: Docker build
        run: docker build -t backyard:ci .
      - name: Compose live probe (ADR-004 role split, first-run boot)
        # Boots the real compose stack and proves the role split live, both ways, so the
        # gate is not vacuous (TS-PG-1): the app role cannot DDL, the migrator can, and the
        # full first-run path (migrate as migrator, gunicorn as app, healthz through Caddy)
        # works end to end. Passwords are throwaway CI values, not secrets.
        env:
          POSTGRES_PASSWORD: ci-not-a-secret
          POSTGRES_MIGRATOR_PASSWORD: ci-migrator-not-a-secret
          POSTGRES_APP_PASSWORD: ci-app-not-a-secret
        run: |
          set -eu
          docker compose up -d --build
          for i in $(seq 1 60); do
            curl -sf http://127.0.0.1:8000/healthz >/dev/null 2>&1 && break
            sleep 2
          done
          curl -sf http://127.0.0.1:8000/healthz
          echo "--- app role is unprivileged ---"
          docker compose exec -T postgres psql -U backyard_app -d backyard -tAc \
            "SELECT current_setting('is_superuser')" | grep -qx off
          if docker compose exec -T postgres psql -U backyard_app -d backyard \
               -c 'CREATE TABLE probe_should_fail (x int)'; then
            echo "VACUOUS GATE: backyard_app can run DDL"; exit 1
          fi
          echo "--- migrator can DDL (probe is non-vacuous) ---"
          docker compose exec -T postgres psql -U backyard_migrator -d backyard \
            -c 'CREATE TABLE probe_migrator_ok (x int); DROP TABLE probe_migrator_ok;'
          echo "--- migrator creds are gone from the running server's env ---"
          # exec'd processes get the container's configured env, so probe PID 1 (gunicorn,
          # exec'd after the entrypoint's unset): its environ must not hold the migrator
          # password, so an RCE in the web process cannot read DDL credentials.
          if docker compose exec -T web sh -c \
               'tr "\0" "\n" < /proc/1/environ | grep -q "^POSTGRES_MIGRATOR_PASSWORD="'; then
            echo "LEAK: migrator password still in the gunicorn process env"; exit 1
          fi
          echo "--- edge cannot even resolve the database (TS-CO-4 network split) ---"
          # Compose DNS resolves a service name only for containers sharing a network,
          # so caddy (edge only) cannot resolve postgres (web-db only): NXDOMAIN.
          if docker compose exec -T caddy nslookup postgres >/dev/null 2>&1; then
            echo "LEAK: caddy can resolve postgres across the network split"; exit 1
          fi
          docker compose exec -T web sh -c \
            'python -c "import socket; socket.create_connection((\"postgres\",5432),3)"' \
            || { echo "web cannot reach postgres (split too aggressive)"; exit 1; }
          echo "--- pre-flight backup ran before migrate (TS-CO-2) ---"
          docker compose exec -T web sh -c 'ls /data/backups/preflight-*.dump' | grep -q preflight
          echo "--- the app role can read AND write the rate-limit cache (TS-DJ-13) ---"
          # As the real backyard_app runtime role, not a superuser: proves the ADR-004
          # default-privilege grant reaches backyard_cache, so allauth's shared rate
          # limit actually works in production (security review MEDIUM-4). A fresh exec
          # gets the container env (backyard_app creds) but not the runtime-generated
          # DJANGO_SECRET_KEY, which lives only in PID 1; source it from the persisted file.
          docker compose exec -T web sh -c 'DJANGO_SECRET_KEY="$(cat /data/secret_key)" python manage.py shell -c "from django.core.cache import cache; cache.set(\"ci-probe\", \"ok\", 30); assert cache.get(\"ci-probe\") == \"ok\"; print(\"app-role cache write OK\")"'
          echo "--- no migrator-owned SECURITY DEFINER routine (PR #46 review LOW-1) ---"
          # The EXECUTE-ON-ROUTINES grant to backyard_app is safe ONLY while the migrator
          # owns no SECURITY DEFINER function: such a function would run with migrator's
          # DDL rights, and the blanket default-privilege would silently hand the app role
          # EXECUTE on it. Pin the invariant here, non-vacuously: there ARE migrator-owned
          # routines (Procrastinate's ~18), and ZERO of them are SECURITY DEFINER.
          MIGRATOR_ROUTINES=$(docker compose exec -T postgres psql -U backyard_migrator -d backyard -tAc \
            "SELECT count(*) FROM pg_proc p JOIN pg_roles r ON p.proowner=r.oid WHERE r.rolname='backyard_migrator'")
          [ "$MIGRATOR_ROUTINES" -gt 0 ] || { echo "probe vacuous: migrator owns no routines"; exit 1; }
          SECDEF=$(docker compose exec -T postgres psql -U backyard_migrator -d backyard -tAc \
            "SELECT count(*) FROM pg_proc p JOIN pg_roles r ON p.proowner=r.oid WHERE r.rolname='backyard_migrator' AND p.prosecdef")
          [ "$SECDEF" = "0" ] || { echo "LEAK: migrator owns $SECDEF SECURITY DEFINER routine(s); app role EXECUTE is an escalation path"; exit 1; }
          echo "migrator owns $MIGRATOR_ROUTINES routines, 0 SECURITY DEFINER (grant is safe)"
          docker compose down -v

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks (pinned + checksum-verified)
        run: |
          # Retry: the release download occasionally resets mid-transfer.
          curl -sSfL --retry 5 --retry-all-errors --retry-delay 3 --connect-timeout 20 \
            https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            -o /tmp/gitleaks.tgz
          echo "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  /tmp/gitleaks.tgz" | sha256sum -c - \
            || { echo "gitleaks checksum mismatch"; exit 1; }
          tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
      - name: Selftest, the gate must catch a planted secret or the build fails
        run: |
          set -e
          mkdir -p "$RUNNER_TEMP/leaktest" && cd "$RUNNER_TEMP/leaktest"
          git init -q
          git config user.email ci@local && git config user.name ci
          # Not the AWS docs example key: that one is in gitleaks' built-in
          # allowlist, and the first CI run proved the gate vacuous with it.
          printf 'aws_access_key_id = AKIA''Q3EGRIJKZVYWXHNM\n' > creds.txt
          git add creds.txt && git commit -qm plant
          if gitleaks git --no-banner --redact . >/dev/null 2>&1; then
            echo "VACUOUS GATE: gitleaks did not catch the planted secret" >&2
            exit 1
          fi
      - name: Scan full history
        run: gitleaks git --no-banner --redact .
