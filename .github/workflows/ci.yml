name: gates

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gates:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - run: python scripts/check_stories.py

  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks (pinned)
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz -o /tmp/gitleaks.tgz
          tar -xzf /tmp/gitleaks.tgz -C /tmp gitleaks
          sudo install /tmp/gitleaks /usr/local/bin/gitleaks
      - name: Selftest, the gate must catch a planted secret or the build fails
        run: |
          set -e
          mkdir -p "$RUNNER_TEMP/leaktest" && cd "$RUNNER_TEMP/leaktest"
          git init -q
          git config user.email ci@local && git config user.name ci
          printf 'aws_access_key_id = AKIA''IOSFODNN7EXAMPLE\n' > creds.txt
          git add creds.txt && git commit -qm plant
          if gitleaks git --no-banner --redact . >/dev/null 2>&1; then
            echo "VACUOUS GATE: gitleaks did not catch the planted secret" >&2
            exit 1
          fi
      - name: Scan full history
        run: gitleaks git --no-banner --redact .
