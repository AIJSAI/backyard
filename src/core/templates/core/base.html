<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>{% block title %}Backyard{% endblock %}</title>
  <link rel="manifest" href="{% url 'manifest' %}">
  <meta name="theme-color" content="#2f5d3a">
  <link rel="apple-touch-icon" href="{% url 'icon_192' %}">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Backyard">
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      max-width: 34rem; margin: 4rem auto; padding: 0 1.25rem; line-height: 1.55;
    }
    h1 { font-size: 1.6rem; margin-bottom: 0.25rem; }
    .muted { opacity: 0.7; }
    label { display: block; margin: 1rem 0 0.25rem; font-weight: 600; }
    input { width: 100%; padding: 0.6rem; font-size: 1rem; box-sizing: border-box; }
    button { margin-top: 1.5rem; padding: 0.7rem 1.2rem; font-size: 1rem; cursor: pointer; }
    .errors { border-left: 3px solid #c0392b; padding: 0.5rem 1rem; margin: 1rem 0; }
    code { background: rgba(127,127,127,0.15); padding: 0.1rem 0.3rem; border-radius: 3px; }
  </style>
</head>
<body>
  {% block body %}{% endblock %}
  <script>
    // Register the minimal service worker so member pages are installable
    // (S-103). The elder token surface deliberately never does this: it is a
    // standalone page with no manifest and no worker (the Safari eviction rule,
    // ADR-002).
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('{% url "service_worker" %}');
      });
    }
  </script>
</body>
</html>
