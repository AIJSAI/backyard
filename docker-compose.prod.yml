# Production overlay for a real deployment (a persistent VM + domain + TLS).
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up --build -d
#
# It replaces the local loopback-plain-HTTP Caddy with a public HTTPS edge:
# Caddy publishes 0.0.0.0:80 + :443 and serves $BACKYARD_DOMAIN with an
# automatically-provisioned Let's Encrypt certificate (caddy/Caddyfile.prod).
#
# The web/worker production env (DJANGO_DEBUG=0, DJANGO_ALLOWED_HOSTS, BACKYARD_BASE_URL)
# is read from .env by the base compose's ${...} substitutions — set them there along
# with the three postgres passwords, BACKYARD_DOMAIN, ACME_EMAIL, and (for email) the
# Resend variables. See docs/runbooks/live-repro.md section B.
# The prod Django HTTPS posture (Secure cookies, HSTS, SSL redirect) keys off
# BACKYARD_BASE_URL's scheme, so this overlay DERIVES the security-critical web/worker env
# from the single BACKYARD_DOMAIN — an operator can't set the domain but forget the https
# base URL and get a silently-insecure-but-working instance (security review S-728 LOW-2).
services:
  web:
    environment:
      DJANGO_DEBUG: "0"
      DJANGO_ALLOWED_HOSTS: ${BACKYARD_DOMAIN:?set BACKYARD_DOMAIN in .env},localhost,127.0.0.1
      BACKYARD_BASE_URL: https://${BACKYARD_DOMAIN}
  worker:
    environment:
      DJANGO_ALLOWED_HOSTS: ${BACKYARD_DOMAIN:?set BACKYARD_DOMAIN in .env},localhost,127.0.0.1
      BACKYARD_BASE_URL: https://${BACKYARD_DOMAIN}
  caddy:
    ports: !override
      - "80:80"
      - "443:443"
    volumes: !override
      - ./caddy/Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddydata:/data
    environment:
      BACKYARD_DOMAIN: ${BACKYARD_DOMAIN:?set BACKYARD_DOMAIN in .env}
      # Required, not optional (S-728 LOW-1): a real ACME account e-mail keeps the ZeroSSL
      # failover issuer + cert-expiry warnings (TS-CA-5); an empty value fails Caddy's parse
      # (fails closed, no plaintext) and a redeploy could silently drop the fallback issuer.
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL in .env (ACME account e-mail; TS-CA-5)}
